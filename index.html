<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="theme-color" content="#080b14"/>
  <title>ALONE CODE STUDIO v3</title>
  <link rel="stylesheet" href="style.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;0,700;1,400&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

  <script type="importmap">
  {
    "imports": {
      "@codemirror/state":           "https://esm.sh/@codemirror/state@6",
      "@codemirror/view":            "https://esm.sh/@codemirror/view@6",
      "@codemirror/commands":        "https://esm.sh/@codemirror/commands@6",
      "@codemirror/language":        "https://esm.sh/@codemirror/language@6",
      "@codemirror/search":          "https://esm.sh/@codemirror/search@6",
      "@codemirror/autocomplete":    "https://esm.sh/@codemirror/autocomplete@6",
      "@codemirror/lint":            "https://esm.sh/@codemirror/lint@6",
      "@codemirror/lang-python":     "https://esm.sh/@codemirror/lang-python@6",
      "@codemirror/lang-javascript": "https://esm.sh/@codemirror/lang-javascript@6",
      "@codemirror/lang-cpp":        "https://esm.sh/@codemirror/lang-cpp@6",
      "@codemirror/lang-java":       "https://esm.sh/@codemirror/lang-java@6",
      "@codemirror/lang-rust":       "https://esm.sh/@codemirror/lang-rust@6",
      "@codemirror/lang-go":         "https://esm.sh/@codemirror/lang-go@6",
      "@codemirror/lang-php":        "https://esm.sh/@codemirror/lang-php@6",
      "@codemirror/lang-html":       "https://esm.sh/@codemirror/lang-html@6",
      "@codemirror/lang-css":        "https://esm.sh/@codemirror/lang-css@6",
      "@codemirror/lang-sql":        "https://esm.sh/@codemirror/lang-sql@6",
      "@codemirror/lang-xml":        "https://esm.sh/@codemirror/lang-xml@6",
      "@codemirror/lang-markdown":   "https://esm.sh/@codemirror/lang-markdown@6",
      "@codemirror/lang-json":       "https://esm.sh/@codemirror/lang-json@6",
      "@codemirror/lang-yaml":       "https://esm.sh/@codemirror/lang-yaml@6",
      "@codemirror/theme-one-dark":  "https://esm.sh/@codemirror/theme-one-dark@6",
      "@lezer/highlight":            "https://esm.sh/@lezer/highlight@1"
    }
  }
  </script>
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
</head>
<body>
<div id="app" v-cloak>

  <!-- ══════════ SPLASH ══════════ -->
  <div class="splash" v-if="loading">
    <div class="splash-inner">
      <div class="splash-logo">
        <svg width="58" height="58" viewBox="0 0 52 52" fill="none">
          <rect width="52" height="52" rx="14" fill="url(#lgS)"/>
          <polyline points="16,20 10,26 16,32" stroke="#4d9eff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          <polyline points="36,20 42,26 36,32" stroke="#bb8fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          <line x1="22" y1="34" x2="30" y2="18" stroke="#3fb950" stroke-width="2.5" stroke-linecap="round"/>
          <defs>
            <linearGradient id="lgS" x1="0" y1="0" x2="52" y2="52" gradientUnits="userSpaceOnUse">
              <stop stop-color="#1f2d4a"/><stop offset="1" stop-color="#0d1117"/>
            </linearGradient>
          </defs>
        </svg>
      </div>
      <div class="splash-title">ALONE CODE STUDIO</div>
      <div class="splash-version">v3.0</div>
      <div class="splash-sub">Initializing workspace…</div>
      <div class="splash-bar"><div class="splash-fill"></div></div>
    </div>
  </div>

  <!-- ══════════ SETTINGS MODAL ══════════ -->
  <div class="modal-overlay" v-if="settingsOpen" @click.self="settingsOpen=false">
    <div class="settings-modal">
      <div class="modal-head">
        <div class="modal-title">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
          Settings
        </div>
        <button class="modal-close" @click="settingsOpen=false">✕</button>
      </div>

      <div class="modal-body">

        <!-- Theme -->
        <div class="settings-section">
          <div class="settings-section-title">EDITOR THEME</div>
          <div class="theme-grid">
            <button v-for="t in availableThemes" :key="t.id"
              class="theme-card" :class="{active: settings.theme===t.id}"
              @click="settings.theme=t.id; applyTheme()">
              <div class="theme-preview" :style="t.preview"></div>
              <span>{{ t.label }}</span>
            </button>
          </div>
        </div>

        <!-- Font Family -->
        <div class="settings-section">
          <div class="settings-section-title">FONT FAMILY</div>
          <div class="font-options">
            <button v-for="f in availableFonts" :key="f.id"
              class="font-option" :class="{active: settings.font===f.id}"
              :style="{fontFamily: f.family}"
              @click="settings.font=f.id; applyFont()">
              {{ f.label }}
            </button>
          </div>
        </div>

        <!-- Font Size -->
        <div class="settings-section">
          <div class="settings-section-title">FONT SIZE</div>
          <div class="size-slider-wrap">
            <input type="range" min="10" max="24" v-model.number="fontSize" class="size-slider" @input="savePrefs"/>
            <span class="size-val">{{ fontSize }}px</span>
          </div>
        </div>

        <!-- Tab Size -->
        <div class="settings-section">
          <div class="settings-section-title">TAB SIZE</div>
          <div class="tab-size-opts">
            <button v-for="n in [2,4,8]" :key="n" class="tab-size-btn"
              :class="{active: settings.tabSize===n}"
              @click="settings.tabSize=n; savePrefs()">{{ n }}</button>
          </div>
        </div>

        <!-- API Key -->
        <div class="settings-section">
          <div class="settings-section-title">ANTHROPIC API KEY</div>
          <div class="api-key-wrap">
            <input :type="showApiKey?'text':'password'" class="api-key-input"
              v-model="settings.apiKey"
              placeholder="sk-ant-api03-…"
              @input="savePrefs"/>
            <button class="api-key-toggle" @click="showApiKey=!showApiKey">
              {{ showApiKey ? '🙈' : '👁' }}
            </button>
          </div>
          <p class="api-key-hint">Used for AI Assistant. Stored only in your browser (localStorage).</p>
        </div>

        <!-- Project Name -->
        <div class="settings-section">
          <div class="settings-section-title">PROJECT NAME</div>
          <input class="project-name-input" v-model="settings.projectName"
            placeholder="my-project" @input="savePrefs"/>
        </div>

        <!-- Keyboard shortcuts reference -->
        <div class="settings-section">
          <div class="settings-section-title">KEYBOARD SHORTCUTS</div>
          <div class="shortcuts-list">
            <div class="shortcut-row" v-for="s in [
              {k:'Ctrl+Enter', a:'Run code'},
              {k:'Ctrl+S',     a:'Save all files'},
              {k:'Ctrl+F',     a:'Find & Replace'},
              {k:'Ctrl+B',     a:'Toggle sidebar'},
              {k:'Ctrl+\\\\',   a:'Toggle split view'},
              {k:'Ctrl+/',     a:'Toggle comment'},
              {k:'Escape',     a:'Close panels'},
            ]" :key="s.k">
              <kbd>{{ s.k }}</kbd>
              <span>{{ s.a }}</span>
            </div>
          </div>
        </div>

      </div><!-- /modal-body -->
    </div>
  </div>

  <!-- ══════════ MAIN APP ══════════ -->
  <template v-if="!loading">

  <!-- TOP BAR -->
  <header class="topbar" :class="{'focus-mode': focusMode}">
    <div class="topbar-left">
      <button class="icon-btn" @click="sidebarOpen=!sidebarOpen" title="Toggle Sidebar (Ctrl+B)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <line x1="9" y1="3" x2="9" y2="21"/>
        </svg>
      </button>
      <div class="brand">
        <svg class="brand-icon" width="20" height="20" viewBox="0 0 52 52" fill="none">
          <rect width="52" height="52" rx="12" fill="url(#lgB)"/>
          <polyline points="16,20 10,26 16,32" stroke="#4d9eff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
          <polyline points="36,20 42,26 36,32" stroke="#bb8fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
          <line x1="22" y1="34" x2="30" y2="18" stroke="#3fb950" stroke-width="3" stroke-linecap="round"/>
          <defs>
            <linearGradient id="lgB" x1="0" y1="0" x2="52" y2="52" gradientUnits="userSpaceOnUse">
              <stop stop-color="#1f2d4a"/><stop offset="1" stop-color="#0d1117"/>
            </linearGradient>
          </defs>
        </svg>
        <span class="brand-name">{{ settings.projectName || 'ALONE CODE STUDIO' }}</span>
      </div>
    </div>

    <div class="topbar-center">
      <div class="lang-picker-wrap">
        <div class="lang-dot" :style="{background: activeLangCfg?.color}"></div>
        <select class="lang-select" v-model="currentLang" @change="onLangChange">
          <optgroup v-for="group in langGroups" :key="group.label" :label="group.label">
            <option v-for="l in group.langs" :key="l.id" :value="l.id">{{ l.icon }} {{ l.label }}</option>
          </optgroup>
        </select>
        <svg width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.5"
          style="color:#8b949e;pointer-events:none;flex-shrink:0"><path d="M1 3l4 4 4-4"/></svg>
      </div>
    </div>

    <div class="topbar-right">
      <!-- Split View -->
      <button class="icon-btn" :class="{active: splitView}" @click="toggleSplitView"
        title="Toggle Split View (Ctrl+\)">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <line x1="12" y1="3" x2="12" y2="21"/>
        </svg>
      </button>

      <!-- Line Wrap -->
      <button class="icon-btn" :class="{active:lineWrap}" @click="toggleWrap" title="Toggle Line Wrap">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/>
          <polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/>
        </svg>
      </button>

      <!-- Find -->
      <button class="icon-btn" :class="{active:findOpen}" @click="findOpen=!findOpen"
        title="Find & Replace (Ctrl+F)">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </button>

      <!-- Download -->
      <button class="icon-btn" @click="downloadFile" title="Download Active File">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
      </button>

      <!-- Settings -->
      <button class="icon-btn" @click="settingsOpen=true" title="Settings">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>

      <!-- AI Panel -->
      <button class="icon-btn ai-btn" :class="{active:aiPanelOpen}" @click="aiPanelOpen=!aiPanelOpen"
        title="AI Assistant">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 2a10 10 0 1 0 10 10"/>
          <circle cx="18" cy="6" r="3" fill="var(--purple)" stroke="none"/>
        </svg>
        <span class="ai-label">AI</span>
      </button>

      <!-- Run Button -->
      <button class="run-btn" @click="runCode" :disabled="isRunning">
        <span v-if="!isRunning" class="run-icon">▶</span>
        <span v-else class="run-spinner"></span>
        <span>{{ isRunning ? 'Running…' : 'RUN' }}</span>
      </button>
    </div>
  </header>

  <!-- ══════════ MAIN AREA ══════════ -->
  <div class="main-area" :class="{'focus-mode': focusMode}">

    <!-- SIDEBAR -->
    <aside class="sidebar glass-panel" :class="{open: sidebarOpen, 'focus-mode': focusMode}">

      <div class="sidebar-head">
        <div class="sidebar-project">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
          </svg>
          <span class="sidebar-label">EXPLORER</span>
        </div>
        <div class="sidebar-actions">
          <button class="icon-btn-sm" @click="createNewFile()" title="New File">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
              <polyline points="14 2 14 8 20 8"/>
              <line x1="12" y1="18" x2="12" y2="12"/>
              <line x1="9" y1="15" x2="15" y2="15"/>
            </svg>
          </button>
          <button class="icon-btn-sm" @click="createNewFolder()" title="New Folder">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
              <line x1="12" y1="11" x2="12" y2="17"/>
              <line x1="9" y1="14" x2="15" y2="14"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- TREE VIEW -->
      <div class="file-tree">
        <tree-node
          v-for="node in fileTree"
          :key="node.id"
          :node="node"
          :active-file-id="activeFileId"
          :split-file-id="splitFileId"
          :depth="0"
          @open-file="switchFile"
          @open-split="openSplit"
          @rename="startRename"
          @delete-node="deleteNode"
          @toggle-folder="toggleFolder"
        />
      </div>

      <div class="sidebar-foot">
        <div class="api-status">
          <span class="status-dot" :class="apiStatus"></span>
          <span>Piston API</span>
        </div>
        <span style="flex:1"></span>
        <div class="version-tag">v3.0</div>
      </div>
    </aside>

    <!-- Mobile overlay -->
    <div class="sidebar-overlay" v-if="sidebarOpen && isMobile" @click="sidebarOpen=false"></div>

    <!-- ══════════ EDITOR ZONE ══════════ -->
    <div class="editor-zone">

      <!-- Split layout: row of panes -->
      <div class="panes-row">

        <!-- PRIMARY PANE -->
        <div class="editor-pane primary-pane">
          <!-- TABS -->
          <div class="tab-bar">
            <div v-for="f in flatFiles" :key="f.id"
              class="tab" :class="{active: f.id===activeFileId}"
              @click="switchFile(f.id)">
              <span class="tab-lang-dot" :style="{background: langCfg(f.lang)?.color}"></span>
              <span class="tab-name">{{ f.name }}</span>
              <span v-if="f.unsaved" class="tab-unsaved" title="Unsaved">●</span>
              <button v-if="flatFiles.length>1" class="tab-close" @click.stop="closeTab(f.id)">
                <svg width="8" height="8" viewBox="0 0 8 8">
                  <line x1="1" y1="1" x2="7" y2="7" stroke="currentColor" stroke-width="1.5"/>
                  <line x1="7" y1="1" x2="1" y2="7" stroke="currentColor" stroke-width="1.5"/>
                </svg>
              </button>
            </div>
            <button class="tab-new" @click="createNewFile()" title="New File">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
              </svg>
            </button>
          </div>

          <!-- FIND & REPLACE -->
          <div class="find-bar" v-if="findOpen">
            <div class="find-row">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                style="flex-shrink:0;color:var(--muted)">
                <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
              </svg>
              <input class="find-input" v-model="findQuery" placeholder="Find…"
                @keyup.enter="doFind" @keyup.escape="findOpen=false" ref="findInputRef"/>
              <input class="find-input" v-model="replaceQuery" placeholder="Replace…"
                @keyup.enter="doReplace"/>
              <button class="find-btn" @click="doFind">Find</button>
              <button class="find-btn" @click="doReplace">Replace</button>
              <button class="find-btn find-close" @click="findOpen=false">✕</button>
            </div>
          </div>

          <!-- PRIMARY EDITOR -->
          <div class="editor-wrap" :style="{height: editorWrapHeight}">
            <div id="cm-editor"></div>
          </div>
        </div><!-- /primary-pane -->

        <!-- SPLIT DIVIDER -->
        <div v-if="splitView && splitFileId" class="split-divider"
          @mousedown="startSplitResize"
          @touchstart.prevent="startSplitResizeTouch">
        </div>

        <!-- SECONDARY PANE -->
        <div v-if="splitView && splitFileId" class="editor-pane secondary-pane"
          :style="{width: splitPaneWidth + 'px'}">
          <div class="tab-bar split-tab-bar">
            <div class="tab active">
              <span class="tab-lang-dot" :style="{background: langCfg(splitFile?.lang)?.color}"></span>
              <span class="tab-name">{{ splitFile?.name }}</span>
              <span v-if="splitFile?.unsaved" class="tab-unsaved">●</span>
            </div>
            <button class="tab-close-pane" @click="closeSplit" title="Close split">✕</button>
          </div>
          <div class="editor-wrap" style="height:100%;">
            <div id="cm-editor-split"></div>
          </div>
        </div><!-- /secondary-pane -->

      </div><!-- /panes-row -->

      <!-- TERMINAL HANDLE -->
      <div class="console-handle" @mousedown="startResize" @touchstart.prevent="startResizeTouch">
        <div class="handle-inner">
          <div class="handle-left">
            <div class="terminal-dots">
              <span class="tdot tdot-red"></span>
              <span class="tdot tdot-yellow"></span>
              <span class="tdot tdot-green"></span>
            </div>
            <span class="handle-label">TERMINAL</span>
          </div>
          <div class="handle-actions">
            <button class="icon-btn-sm" @click.stop="clearOutput" title="Clear terminal">
              <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <polyline points="3 6 5 6 21 6"/>
                <path d="M19 6l-1 14H6L5 6"/>
              </svg>
            </button>
            <button class="icon-btn-sm" @click.stop="copyOutput" title="Copy output">
              <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <rect x="9" y="9" width="13" height="13" rx="2"/>
                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
              </svg>
            </button>
          </div>
        </div>
      </div>

      <!-- TERMINAL OUTPUT -->
      <div class="console terminal" :style="{height: consoleH+'px'}" ref="consoleRef">
        <div v-if="!outputLines.length" class="terminal-welcome">
          <div class="terminal-prompt-line">
            <span class="term-prompt">~$</span>
            <span class="term-idle-text">Press <kbd>Ctrl+Enter</kbd> to run · type <kbd>help</kbd> for commands</span>
            <span class="term-cursor-blink">▋</span>
          </div>
        </div>

        <div v-for="(line, i) in outputLines" :key="i"
          class="out-line" :class="'out-' + line.type">
          <span class="out-prefix-wrap">
            <span v-if="line.type==='cmd'"     class="out-prefix term-prompt-sym">~$</span>
            <span v-else-if="line.type==='error'"   class="out-prefix out-err-sym">✗</span>
            <span v-else-if="line.type==='success'" class="out-prefix out-ok-sym">✓</span>
            <span v-else-if="line.type==='info'"    class="out-prefix out-info-sym">›</span>
            <span v-else-if="line.type==='ai'"      class="out-prefix out-ai-sym">✦</span>
            <span v-else class="out-prefix">&nbsp;</span>
          </span>
          <span class="out-text" v-html="highlightOutput(line.text)"></span>
        </div>

        <!-- Interactive terminal input -->
        <div class="terminal-input-line">
          <span class="term-prompt">~$</span>
          <input class="term-input" v-model="termInput"
            @keydown.enter="execTermCmd"
            @keydown.up.prevent="termHistoryUp"
            @keydown.down.prevent="termHistoryDown"
            placeholder="type a command… (try: help, ls, run)"
            ref="termInputRef"
            autocomplete="off" autocorrect="off" spellcheck="false"/>
          <span class="term-cursor-blink" v-if="!termInput">▋</span>
        </div>
      </div>

    </div><!-- /editor-zone -->

    <!-- ══════════ AI PANEL ══════════ -->
    <aside class="ai-panel glass-panel" :class="{open: aiPanelOpen}">
      <div class="ai-head">
        <div class="ai-title">
          <div class="ai-status-dot"></div>
          AI Assistant
        </div>
        <div class="ai-head-actions">
          <button class="icon-btn-sm" @click="clearAiChat" title="Clear chat">
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/>
            </svg>
          </button>
          <button class="icon-btn-sm" @click="aiPanelOpen=false">✕</button>
        </div>
      </div>

      <!-- Context toggle -->
      <div class="ai-context-bar">
        <span class="ai-ctx-label">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/>
          </svg>
          {{ aiIncludeCode ? flatFiles.length + ' file(s) in context' : 'No code context' }}
        </span>
        <button class="ai-ctx-toggle" :class="{active: aiIncludeCode}" @click="aiIncludeCode=!aiIncludeCode">
          {{ aiIncludeCode ? 'ON' : 'OFF' }}
        </button>
      </div>

      <!-- Quick prompts -->
      <div class="ai-presets">
        <button v-for="p in aiPresets" :key="p.label" class="preset-btn"
          @click="aiPrompt=p.prompt">{{ p.label }}</button>
      </div>

      <!-- Chat messages -->
      <div class="ai-chat-wrap" ref="aiChatRef">
        <div v-if="!aiMessages.length" class="ai-empty">
          <div class="ai-empty-icon">✦</div>
          <p>Ask me anything about your code.<br>
            With context <strong>ON</strong>, I can see all {{ flatFiles.length }} open file(s).</p>
        </div>
        <div v-for="(m, i) in aiMessages" :key="i" class="ai-msg" :class="'ai-msg-' + m.role">
          <div class="ai-msg-role">{{ m.role==='user' ? 'You' : 'AI' }}</div>
          <div class="ai-msg-content" v-html="formatAiMsg(m.content)"></div>
        </div>
        <div v-if="aiLoading" class="ai-thinking">
          <span></span><span></span><span></span>
        </div>
      </div>

      <!-- Input area -->
      <div class="ai-input-wrap">
        <textarea class="ai-textarea" v-model="aiPrompt" rows="3"
          placeholder="Ask about your code… (Ctrl+Enter to send)"
          @keydown.enter.ctrl="sendAiMessage"
          @keydown.enter.meta="sendAiMessage">
        </textarea>
        <div class="ai-input-actions">
          <span class="ai-model-badge">claude-sonnet-4</span>
          <button class="ai-send-btn" @click="sendAiMessage" :disabled="aiLoading">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="22" y1="2" x2="11" y2="13"/>
              <polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
            Send
          </button>
        </div>
      </div>
    </aside>

  </div><!-- /main-area -->

  <!-- ══════════ STATUS BAR ══════════ -->
  <footer class="statusbar" :class="{'focus-mode': focusMode}">
    <div class="sb-left">
      <button class="sb-btn" @click="sidebarOpen=!sidebarOpen">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
        </svg>
        {{ settings.projectName || 'my-project' }}
      </button>
      <span class="sb-sep">›</span>
      <span class="sb-git">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="6" y1="3" x2="6" y2="15"/>
          <circle cx="18" cy="6" r="3"/><circle cx="6" cy="18" r="3"/>
          <path d="M18 9a9 9 0 0 1-9 9"/>
        </svg>
        main
      </span>
      <span v-if="modifiedCount>0" class="git-m">M+{{ modifiedCount }}</span>
    </div>

    <div class="sb-center">
      <span class="sb-file" :style="{color: activeLangCfg?.color}">
        {{ activeLangCfg?.icon }} {{ activeFile?.name }}
      </span>
      <span class="sb-sep">|</span>
      <span>Ln {{ cursorLine }}, Col {{ cursorCol }}</span>
    </div>

    <div class="sb-right">
      <span class="sb-encoding">UTF-8</span>
      <span class="sb-sep">|</span>
      <span class="sb-lang-label" :style="{color: activeLangCfg?.color}">{{ activeLangCfg?.label }}</span>
      <span class="sb-sep">|</span>
      <button class="sb-btn focus-toggle" :class="{active: focusMode}" @click="toggleFocusMode"
        title="Toggle Focus Mode">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path v-if="!focusMode" d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>
          <path v-else d="M8 3v3a2 2 0 0 1-2 2H3m18 0h-3a2 2 0 0 1-2-2V3m0 18v-3a2 2 0 0 1 2-2h3M3 16h3a2 2 0 0 1 2 2v3"/>
        </svg>
        {{ focusMode ? 'Exit Focus' : 'Focus' }}
      </button>
      <span class="sb-sep">|</span>
      <span class="sb-live">
        <span class="status-dot-sm" :class="apiStatus"></span>
        {{ apiStatus==='ok' ? 'Live' : apiStatus==='loading' ? 'Running' : 'Error' }}
      </span>
    </div>
  </footer>

  </template><!-- /!loading -->
</div>

<script type="module" src="main.js"></script>
</body>
</html>
